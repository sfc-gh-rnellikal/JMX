# Snowflake JMeter Configuration
# Usage: jmeter -n -t Snowflake_Performance_Test_V2.jmx -q snowflake.properties -l results.jtl

# Snowflake Connection
snowflake.url=jdbc:snowflake://SFPSCOGS-KAPILARORA_AWS_POLARIS_UNISTORE.snowflakecomputing.com/?warehouse=NEW_INT_WH&db=DEMO&schema=DEMO
snowflake.username=<YOUR_USERNAME>
snowflake.password=<YOUR_PASSWORD_OR_TOKEN>

# Connection Pool Size (max concurrent JDBC connections)
snowflake.poolMax=30

# Thread Count (concurrent virtual users)
snowflake.threads=80

# Test Duration in seconds (600 = 10 min)
test.duration=600
